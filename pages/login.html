<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PennCloud - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-penn-blue {
            background-color: #01256E;
            border-color: #01256E;
            color: white;
        }

        .btn-penn-blue:hover {
            background-color: #011a4d;
            border-color: #011a4d;
            color: white;
        }

        .text-penn-blue {
            color: #01256E;
        }

        .card {
            border: none;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center" style="margin-top: 100px;">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4 text-penn-blue">
                            <strong>PennCloud</strong> ☁️
                        </h2>

                        <!-- ERROR_PLACEHOLDER -->

                        <!-- POST to /login -->
                        <form method="POST" action="/login">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" placeholder="your.email@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-penn-blue w-100 mb-3">Login</button>
                        </form>

                        <hr>

                        <div class="text-center">
                            <p class="text-muted mb-2">Don't have an account?</p>
                            <a href="/register" class="btn btn-outline-secondary w-100">Create Account</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
