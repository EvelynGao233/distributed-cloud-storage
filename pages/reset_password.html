<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PennCloud - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-penn-blue {
            background-color: #01256E;
            border-color: #01256E;
            color: white;
        }

        .btn-penn-blue:hover {
            background-color: #011a4d;
            border-color: #011a4d;
            color: white;
        }

        .text-penn-blue {
            color: #01256E;
        }

        .card {
            border: none;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center" style="margin-top: 100px;">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4 text-penn-blue">
                            <strong>Change Password</strong>
                        </h2>
                        <p class="text-center text-muted mb-4">Enter your new password</p>

                        <!-- ERROR_PLACEHOLDER -->

                        <form method="POST" action="/reset-password">
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Enter new password" required>
                                <small class="text-muted">At least 6 characters</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm New Password</label>
                                <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter new password" required>
                            </div>
                            <button type="submit" class="btn btn-penn-blue w-100 mb-3">Change Password</button>
                        </form>

                        <hr>

                        <div class="text-center">
                            <a href="/inbox" class="btn btn-outline-secondary w-100">Back to Inbox</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
