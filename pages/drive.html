<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PennCloud - Drive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-penn-blue {
            background-color: #01256E !important;
        }

        .navbar-brand img {
            height: 35px;
            margin-right: 10px;
        }

        .card {
            border-radius: 8px;
        }

        .file-item {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #eee;
        }

        .file-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .file-actions .btn {
            min-width: 80px;
        }
    </style>
</head>

<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-penn-blue">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/images/upenn_logo.png" alt="UPenn Logo">
                <strong>PennCloud</strong>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/inbox">Inbox</a>
                <a class="nav-link active" href="/drive"><strong>Drive</strong></a>
                <a class="nav-link" href="/reset-password">Change Password</a>
                <a class="nav-link" href="/logout">Logout</a>
                <span class="navbar-text text-white ms-3">
                    👤 <strong><!-- USERNAME_PLACEHOLDER --></strong>
                </span>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">

            <!-- LEFT COLUMN -->
            <div class="col-md-3">

                <!-- Upload File -->
                <div class="card shadow-sm mb-3">
                    <div class="card-body">
                        <h5 class="card-title text-primary">Upload File</h5>
                        <form method="POST" action="/upload?path=<!-- CURRENT_PATH -->" enctype="multipart/form-data">
                            <div class="mb-3">
                                <input type="file" name="file" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Upload</button>
                        </form>
                    </div>
                </div>

                <!-- Create Folder -->
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-success">New Folder</h5>
                        <form method="POST" action="/create_folder">
                            <input type="hidden" name="current_folder" value="<!-- CURRENT_PATH -->">
                            <div class="mb-3">
                                <input type="text" name="folder_name" class="form-control" placeholder="Folder name"
                                    required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Create Folder</button>
                        </form>
                    </div>
                </div>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="col-md-9">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <div class="d-flex flex-column">
                            <h3 class="mb-1">My Drive</h3>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb mb-0">
                                    <!-- BREADCRUMB_PLACEHOLDER -->
                                </ol>
                            </nav>
                        </div>
                    </div>
                    <div class="list-group list-group-flush">
                        <!-- FILE_LIST_PLACEHOLDER -->
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
