<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PennCloud - Inbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-penn-blue {
            background-color: #01256E !important;
        }

        .navbar-brand img {
            height: 35px;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-penn-blue">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/images/upenn_logo.png" alt="UPenn Logo">
                <strong>PennCloud</strong>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/inbox">
                    <strong>Inbox</strong>
                </a>
                <a class="nav-link" href="/drive">Drive</a>
                <a class="nav-link" href="/reset-password">Change Password</a>
                <a class="nav-link" href="/logout">Logout</a>
                <span class="navbar-text text-white ms-3">
                    👤 <strong><!-- USERNAME_PLACEHOLDER --></strong>
                </span>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Inbox</h2>
            <a href="/mail/compose" class="btn btn-primary">
                ✏️ Compose
            </a>
        </div>

        <!-- Email list -->
        <div class="card">
            <div class="card-header bg-light">
                <strong>Your Messages</strong>
            </div>
            <div class="list-group list-group-flush">
                <!-- Empty state -->
                <div class="list-group-item text-center py-5 text-muted">
                    <div style="font-size: 48px;">📭</div>
                    <h5 class="mt-3">No messages</h5>
                    <p>Your inbox is empty</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
