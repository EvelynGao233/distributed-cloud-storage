<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PennCloud - Compose Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-penn-blue {
            background-color: #01256E !important;
        }

        .navbar-brand img {
            height: 35px;
            margin-right: 10px;
        }

        .btn-penn-blue {
            background-color: #01256E;
            border-color: #01256E;
            color: white;
        }

        .btn-penn-blue:hover {
            background-color: #011a4d;
            border-color: #011a4d;
            color: white;
        }
    </style>
</head>

<body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-penn-blue">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/images/upenn_logo.png" alt="UPenn Logo">
                <strong>PennCloud</strong>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/inbox">Inbox</a>
                <a class="nav-link" href="/drive">Drive</a>
                <a class="nav-link" href="/logout">Logout</a>
                <span class="navbar-text text-white ms-3">
                    👤 <strong><!-- USERNAME_PLACEHOLDER --></strong>
                </span>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-light">
                        <h4 class="mb-0">✉️ Compose Email</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="/mail/send">
                            <div class="mb-3">
                                <label class="form-label">To:</label>
                                <input type="email" name="recipient" class="form-control" placeholder="recipient@example.com"
                                    required>
                                <small class="text-muted">Enter recipient's email address</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Subject:</label>
                                <input type="text" name="subject" class="form-control" placeholder="Enter subject"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Message:</label>
                                <textarea name="body" class="form-control" rows="10"
                                    placeholder="Write your message here..." required></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-penn-blue">
                                    Send
                                </button>
                                <a href="/inbox" class="btn btn-outline-secondary">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
