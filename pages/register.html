<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PennCloud - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-penn-blue {
            background-color: #01256E;
            border-color: #01256E;
            color: white;
        }

        .btn-penn-blue:hover {
            background-color: #011a4d;
            border-color: #011a4d;
            color: white;
        }

        .text-penn-blue {
            color: #01256E;
        }

        .card {
            border: none;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center" style="margin-top: 80px;">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4 text-penn-blue">
                            <strong>Create Account</strong>
                        </h2>
                        <p class="text-center text-muted mb-4">Join PennCloud today</p>

                        <!-- ERROR_PLACEHOLDER -->

                        <!-- POST to /register -->
                        <form method="POST" action="/register">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <div class="input-group">
                                    <input type="text" name="username" class="form-control" placeholder="username"
                                        required>
                                    <span class="input-group-text">@penncloud.com</span>
                                </div>
                                <small class="text-muted">Your email will be username@penncloud.com</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control"
                                    placeholder="Enter a strong password" required>
                                <small class="text-muted">At least 6 characters</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" name="confirm_password" class="form-control"
                                    placeholder="Re-enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-penn-blue w-100 mb-3">Create Account</button>
                        </form>

                        <hr>

                        <div class="text-center">
                            <p class="text-muted mb-2">Already have an account?</p>
                            <a href="/login" class="btn btn-outline-secondary w-100">Sign In</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
