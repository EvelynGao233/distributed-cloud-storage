<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PennCloud - Move Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .navbar-penn-blue {
            background-color: #01256E !important;
        }

        .navbar-brand img {
            height: 35px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-penn-blue">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/images/upenn_logo.png">
                <strong>PennCloud</strong>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/inbox">Inbox</a>
                <a class="nav-link" href="/drive"><strong>Drive</strong></a>
                <a class="nav-link" href="/logout">Logout</a>
                <span class="navbar-text text-white ms-3">
                    👤 <strong><!-- USERNAME_PLACEHOLDER --></strong>
                </span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="card shadow">
                    <div class="card-header bg-light">
                        <h4 class="mb-0">📁 Move Item</h4>
                    </div>

                    <div class="card-body">

                        <p><strong>Item:</strong> <!-- ITEM_NAME --></p>
                        <p><strong>Current Location:</strong> <!-- CURRENT_FOLDER --> </p>

                        <form method="POST" action="/move">

                            <input type="hidden" name="item_path" value="<!-- ITEM_PATH -->">
                            <input type="hidden" name="item_type" value="<!-- ITEM_TYPE -->">
                            <input type="hidden" name="current_folder" value="<!-- CURRENT_FOLDER -->">

                            <h6>Select destination folder:</h6>

                            <div class="list-group mb-3">
                                <!-- FOLDER_LIST -->
                            </div>

                            <div class="d-flex gap-2">
                                <a href="/drive?path=<!-- CURRENT_FOLDER -->"
                                    class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Move</button>
                            </div>

                        </form>

                    </div>

                </div>
            </div>
        </div>
    </div>

</body>

</html>
